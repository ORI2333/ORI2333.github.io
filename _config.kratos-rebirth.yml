additional_injections:
  head: "<style>.kratos-cover.kratos-cover-2{background-position:center center!important;background-repeat:no-repeat!important;background-size:cover!important;}.widget-kratos-about .about-contact-icons{display:flex;justify-content:space-evenly;align-items:center;max-width:240px;margin:14px auto 0;}.widget-kratos-about .about-contact-icons a{line-height:1;color:inherit;display:inline-flex;align-items:center;justify-content:center;min-width:38px;min-height:38px;}.widget-kratos-about .about-contact-icons a i{font-size:24px;}.widget-kratos-about .about-contact-icons a img{width:24px;height:24px;object-fit:contain;display:block;}.widget-kratos-about .about-contact-icons a img[alt='Email']{width:27px;height:27px;opacity:.98;}html[data-theme='dark'] .widget-kratos-about .about-contact-icons a img[alt='GitHub']{filter:brightness(0) invert(1);opacity:.98;}.widget-kratos-about .about-contact-icons a:hover{transform:translateY(-1px);}#footer .kratos-social-icons li a{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;}#footer .kratos-social-icons li a .footer-social-icon{width:34px;height:34px;object-fit:contain;display:block;}#footer .kratos-social-icons li a .footer-icon-email{filter:brightness(0) invert(1);opacity:.94;}#footer .kratos-social-icons li a .footer-icon-github{filter:brightness(0) invert(1);opacity:.95;}.kr-comments-disabled{margin:16px 0;padding:12px 14px;border:1px dashed rgba(160,160,160,.45);border-radius:10px;color:#9aa3b7;background:rgba(90,98,120,.08);text-align:center;}</style>"
  footer: ""
  after_footer: |
    <style>
    #kr-share-modal .kr-modal-content{max-width:660px;max-height:560px;}
    #kr-share-modal .kr-modal-body{gap:14px;padding:1rem 2rem 1.6rem;}
    #kr-share-modal .kr-share-message{line-height:1.7;text-align:left;width:100%;}
    #kr-share-modal .kr-share-qr{width:212px;height:212px;padding:8px;background:rgba(255,255,255,.03);}
    #kr-share-modal .kr-share-qr canvas,
    #kr-share-modal .kr-share-qr svg{width:192px!important;height:192px!important;}
    #kr-share-modal .ori-share-link{width:min(100%,500px);display:flex;gap:8px;align-items:center;}
    #kr-share-modal .ori-share-input{flex:1;min-width:0;height:38px;padding:0 12px;border:1px solid rgba(120,206,121,.65);border-radius:8px;background:rgba(255,255,255,.08);color:inherit;font-size:14px;line-height:38px;outline:none;overflow:hidden;text-overflow:ellipsis;}
    #kr-share-modal .ori-share-copy{flex:0 0 auto;height:38px;padding:0 14px!important;border-radius:8px!important;background:#78ce79!important;color:#08140a!important;font-size:14px!important;font-weight:600;}
    #kr-share-modal .ori-share-copy:hover{filter:brightness(1.06);}
    @media (max-width:560px){
      #kr-share-modal .kr-modal-content{max-height:620px;padding:12px;}
      #kr-share-modal .kr-modal-body{padding:1rem;gap:12px;}
      #kr-share-modal .kr-share-qr{width:196px;height:196px;}
      #kr-share-modal .kr-share-qr canvas,
      #kr-share-modal .kr-share-qr svg{width:176px!important;height:176px!important;}
      #kr-share-modal .ori-share-link{flex-direction:column;align-items:stretch;}
      #kr-share-modal .ori-share-copy{width:100%;}
    }
    </style>
    <script>
    window.__COMMENTS_ENABLED=false;
    (function(){
      var gateway = "https://blog.orixx.xyz/";
      function originalUrl(){
        var meta = document.querySelector('meta[property="og:url"]');
        return meta && meta.content ? meta.content : location.href;
      }
      function normalizePath(path){
        path = "/" + String(path || "").replace(/^\/+/, "");
        return path.replace(/\/{2,}/g, "/");
      }
      function stripBlogPrefix(path){
        var normalized = normalizePath(path).replace(/\/index\.html$/i, "/");
        if (normalized.toLowerCase().indexOf("/blog/") === 0) return normalizePath(normalized.slice(5));
        if (normalized.toLowerCase() === "/blog") return "/";
        return normalized;
      }
      function normalizeSharePath(path){
        var normalized = stripBlogPrefix(path);
        if (normalized !== "/" && normalized.slice(-1) !== "/") normalized += "/";
        return normalized;
      }
      function utf8Bytes(value){
        if (window.TextEncoder) return Array.prototype.slice.call(new TextEncoder().encode(value));
        var utf8 = unescape(encodeURIComponent(value));
        var bytes = [];
        for (var i = 0; i < utf8.length; i += 1) bytes.push(utf8.charCodeAt(i));
        return bytes;
      }
      function shortIdFromPath(path){
        var hash = 2166136261;
        var bytes = utf8Bytes(normalizeSharePath(path));
        for (var i = 0; i < bytes.length; i += 1) {
          hash ^= bytes[i];
          hash = Math.imul(hash, 16777619) >>> 0;
        }
        var id = hash.toString(36);
        while (id.length < 7) id = "0" + id;
        return id;
      }
      function sharePath(){
        try {
          return normalizeSharePath(decodeURI(new URL(originalUrl(), location.href).pathname || "/"));
        } catch (error) {
          return normalizeSharePath(decodeURI(location.pathname || "/"));
        }
      }
      function shareUrl(){
        return gateway + "s/" + shortIdFromPath(sharePath());
      }
      function metaContent(selector){
        var node = document.querySelector(selector);
        return node && node.content ? node.content : "";
      }
      function replaceToken(value, token, replacement){
        return String(value).split(token).join(replacement);
      }
      function renderShareQr(){
        var box = document.getElementById("kr-share-qr");
        if (!box || !window.QRCodeStyling) return;
        box.innerHTML = "";
        new QRCodeStyling({
          width: 192,
          height: 192,
          data: shareUrl(),
          image: (document.querySelector('link[rel="icon"]') || {}).href,
          dotsOptions: { color: "#78ce79", type: "extra-rounded" },
          backgroundOptions: { color: "transparent" },
          imageOptions: { crossOrigin: "anonymous", margin: 1 }
        }).append(box);
        updateShareLinkBox();
      }
      function ensureShareLinkBox(){
        var body = document.querySelector("#kr-share-modal .kr-modal-body");
        if (!body) return null;
        var box = body.querySelector(".ori-share-link");
        if (box) return box;
        box = document.createElement("div");
        box.className = "ori-share-link";
        box.innerHTML = '<input class="ori-share-input" type="text" readonly aria-label="分享链接"><button class="ori-share-copy" type="button">复制链接</button>';
        var platforms = body.querySelector(".kr-share-platforms");
        body.insertBefore(box, platforms || null);
        var input = box.querySelector(".ori-share-input");
        var button = box.querySelector(".ori-share-copy");
        input.addEventListener("focus", function(){ input.select(); });
        button.addEventListener("click", function(){
          var link = input.value;
          function done(){
            button.textContent = "已复制";
            setTimeout(function(){ button.textContent = "复制链接"; }, 1400);
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(link).then(done).catch(function(){ input.select(); document.execCommand("copy"); done(); });
          } else {
            input.select();
            document.execCommand("copy");
            done();
          }
        });
        return box;
      }
      function updateShareLinkBox(){
        var box = ensureShareLinkBox();
        if (!box) return;
        var input = box.querySelector(".ori-share-input");
        if (input) input.value = shareUrl();
      }
      function installShareOverride(){
        ensureShareLinkBox();
        updateShareLinkBox();
        window.krShareModalOpenPlatform = function(template){
          var link = String(template || "$URL");
          link = replaceToken(link, "$URL", shareUrl());
          link = replaceToken(link, "$TITLE", metaContent('meta[property="og:title"]'));
          link = replaceToken(link, "$SUMMARY", metaContent('meta[property="og:description"]'));
          link = replaceToken(link, "$SITE", metaContent('meta[property="og:site_name"]'));
          window.open(link, "_blank");
        };
        window.initQRCode = renderShareQr;
        if (window.krOpenShareModal && !window.krOpenShareModal.__oriWrapped) {
          var open = window.krOpenShareModal;
          window.krOpenShareModal = function(){
            open();
            setTimeout(renderShareQr, 50);
          };
          window.krOpenShareModal.__oriWrapped = true;
        }
        renderShareQr();
      }
      document.addEventListener("DOMContentLoaded", installShareOverride);
      window.addEventListener("load", installShareOverride);
      window.addEventListener("pjax:complete", function(){ setTimeout(installShareOverride, 50); });
    })();
    </script>
  tools: ""
