comments:
  core:
    enable_at: []
    template:
      _shared: |
        <link rel="stylesheet" href="https://unpkg.com/@waline/client@v3/dist/waline.css">
      index: ""
      post: |
        <div id="waline"></div>
        <script type="module">
          const __COMMENTS_ENABLED = window.__COMMENTS_ENABLED !== false;
          if (!__COMMENTS_ENABLED) {
            const walineEl = document.getElementById('waline');
            if (walineEl) {
              walineEl.outerHTML = '<div class="kr-comments-disabled">评论已关闭（审查中）</div>';
            }
          } else {
            import { init } from 'https://unpkg.com/@waline/client@v3/dist/waline.js';
            init({
              el: '#waline',
              serverURL: window.__WALINE_SERVER,
              path: '$PATH',
              dark: "html[data-theme='dark']",
              pageview: false,
              comment: true,
              reaction: [
                '/icons/waline-reaction/weibo_heart_eyes.png',
                '/icons/waline-reaction/weibo_dog_joy.png',
                '/icons/waline-reaction/weibo_dog_consider.png',
                '/icons/waline-reaction/weibo_sob.png',
                '/icons/waline-reaction/weibo_sad.png',
                '/icons/waline-reaction/weibo_look_down.png',
              ],
              lang: 'zh-CN',
              locale: {
                reactionTitle: '感觉如何?',
                reaction0: '大爱',
                reaction1: '期待',
                reaction2: '不明觉厉',
                reaction3: '拳头硬了',
                reaction4: '离谱',
                reaction5: '困了',
              },
            });
          }
        </script>
      page: |
        <div id="waline"></div>
        <script type="module">
          const __COMMENTS_ENABLED = window.__COMMENTS_ENABLED !== false;
          if (!__COMMENTS_ENABLED) {
            const walineEl = document.getElementById('waline');
            if (walineEl) {
              walineEl.outerHTML = '<div class="kr-comments-disabled">评论已关闭（审查中）</div>';
            }
          } else {
            import { init } from 'https://unpkg.com/@waline/client@v3/dist/waline.js';
            init({
              el: '#waline',
              serverURL: window.__WALINE_SERVER,
              path: '$PATH',
              dark: "html[data-theme='dark']",
              pageview: false,
              comment: true,
              reaction: [
                '/icons/waline-reaction/weibo_heart_eyes.png',
                '/icons/waline-reaction/weibo_dog_joy.png',
                '/icons/waline-reaction/weibo_dog_consider.png',
                '/icons/waline-reaction/weibo_sob.png',
                '/icons/waline-reaction/weibo_sad.png',
                '/icons/waline-reaction/weibo_look_down.png',
              ],
              lang: 'zh-CN',
              locale: {
                reactionTitle: '感觉如何?',
                reaction0: '大爱',
                reaction1: '期待',
                reaction2: '不明觉厉',
                reaction3: '拳头硬了',
                reaction4: '离谱',
                reaction5: '困了',
              },
            });
          }
        </script>
  count:
    enable_at: []
    template:
      _shared: |
        <script type="module">
          const __COMMENTS_ENABLED = window.__COMMENTS_ENABLED !== false;
          const commentEls = document.querySelectorAll('.waline-comment-count');
          if (!__COMMENTS_ENABLED) {
            commentEls.forEach((el) => {
              const wrapper = el.closest('span') || el;
              wrapper.style.display = 'none';
            });
          } else {
            import { commentCount } from 'https://unpkg.com/@waline/client@v3/dist/comment.js';
            commentCount({
              serverURL: window.__WALINE_SERVER,
              path: window.location.pathname,
            });
          }
        </script>
      index: |
        <span class="waline-comment-count" data-path="$PATH">0</span>
      post: |
        <span class="waline-comment-count" data-path="$PATH">0</span>
  path_hasher: md5

