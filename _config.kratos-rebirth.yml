  footer: "" # 注入到页面主体的内容，例如额外的可见组件
  after_footer: "<script>window.__WALINE_SERVER='https://your-waline-server.example.com';window.__COMMENTS_ENABLED=true;</script>" # 站点分析，或是追加的脚本
  tools: "" # 注入到页面右下角浮动工具栏里的功能按钮
