comments:
  core:
    enable_at: []
    template:
      _shared: |
        <link rel="stylesheet" href="https://unpkg.com/@waline/client@v3/dist/waline.css">
      index: ""
      post: |
        <div id="waline"></div>
        <script type="module">
          const __COMMENTS_ENABLED = window.__COMMENTS_ENABLED !== false;
          if (!__COMMENTS_ENABLED) {
            const walineEl = document.getElementById('waline');
            if (walineEl) {
              walineEl.outerHTML = '<div class="kr-comments-disabled">评论已关闭（审查中）</div>';
            }
          } else {
            import { init } from 'https://unpkg.com/@waline/client@v3/dist/waline.js';
            init({
              el: '#waline',
              serverURL: window.__WALINE_SERVER,
              path: '$PATH',
              dark: "html[data-theme='dark']",
              pageview: false,
              comment: true,
              reaction: [
                '/blog/icons/waline-reaction/weibo_heart_eyes.png',
                '/blog/icons/waline-reaction/weibo_dog_joy.png',
                '/blog/icons/waline-reaction/weibo_dog_consider.png',
                '/blog/icons/waline-reaction/weibo_sob.png',
                '/blog/icons/waline-reaction/weibo_sad.png',
                '/blog/icons/waline-reaction/weibo_look_down.png',
              ],
              lang: 'zh-CN',
              locale: {
                reactionTitle: '感觉如何?',
                reaction0: '大爱',
                reaction1: '期待',
                reaction2: '不明觉厉',
                reaction3: '拳头硬了',
                reaction4: '离谱',
                reaction5: '困了',
              },
            });
          }
        </script>
      page: |
        <div id="waline"></div>
        <script type="module">
          const __COMMENTS_ENABLED = window.__COMMENTS_ENABLED !== false;
          if (!__COMMENTS_ENABLED) {
            const walineEl = document.getElementById('waline');
            if (walineEl) {
              walineEl.outerHTML = '<div class="kr-comments-disabled">评论已关闭（审查中）</div>';
            }
          } else {
            import { init } from 'https://unpkg.com/@waline/client@v3/dist/waline.js';
            init({
              el: '#waline',
              serverURL: window.__WALINE_SERVER,
              path: '$PATH',
              dark: "html[data-theme='dark']",
              pageview: false,
              comment: true,
              reaction: [
                '/blog/icons/waline-reaction/weibo_heart_eyes.png',
                '/blog/icons/waline-reaction/weibo_dog_joy.png',
                '/blog/icons/waline-reaction/weibo_dog_consider.png',
                '/blog/icons/waline-reaction/weibo_sob.png',
                '/blog/icons/waline-reaction/weibo_sad.png',
                '/blog/icons/waline-reaction/weibo_look_down.png',
              ],
              lang: 'zh-CN',
              locale: {
                reactionTitle: '感觉如何?',
                reaction0: '大爱',
                reaction1: '期待',
                reaction2: '不明觉厉',
                reaction3: '拳头硬了',
                reaction4: '离谱',
                reaction5: '困了',
              },
            });
          }
        </script>
  count:
    enable_at: []
    template:
      _shared: |
        <script type="module">
          const __COMMENTS_ENABLED = window.__COMMENTS_ENABLED !== false;
          const commentEls = document.querySelectorAll('.waline-comment-count');
          if (!__COMMENTS_ENABLED) {
            commentEls.forEach((el) => {
              const wrapper = el.closest('span') || el;
              wrapper.style.display = 'none';
            });
          } else {
            import { commentCount } from 'https://unpkg.com/@waline/client@v3/dist/comment.js';
            commentCount({
              serverURL: window.__WALINE_SERVER,
              path: window.location.pathname,
            });
          }
        </script>
      index: |
        <span class="waline-comment-count" data-path="$PATH">0</span>
      post: |
        <span class="waline-comment-count" data-path="$PATH">0</span>
  path_hasher: md5

visit_count:
  enable_at:
    - post
  template:
    _shared: |
      <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
      <script>
        document.addEventListener('DOMContentLoaded', function () {
          var container = document.getElementById('busuanzi_container_page_pv');
          if (container) {
            container.style.display = 'inline';
          }
        });
      </script>
    index: ""
    post: |
      <span id="busuanzi_container_page_pv" style="display:none;"><span id="busuanzi_value_page_pv">0</span></span>
  path_hasher: md5

additional_injections:
  head: "<style>.widget-kratos-about .about-contact-icons{display:flex;justify-content:space-evenly;align-items:center;max-width:240px;margin:14px auto 0;}.widget-kratos-about .about-contact-icons a{line-height:1;color:inherit;display:inline-flex;align-items:center;justify-content:center;min-width:38px;min-height:38px;}.widget-kratos-about .about-contact-icons a i{font-size:24px;}.widget-kratos-about .about-contact-icons a img{width:24px;height:24px;object-fit:contain;display:block;}.widget-kratos-about .about-contact-icons a img[alt='Email']{width:27px;height:27px;opacity:.98;}html[data-theme='dark'] .widget-kratos-about .about-contact-icons a img[alt='GitHub']{filter:brightness(0) invert(1);opacity:.98;}.widget-kratos-about .about-contact-icons a:hover{transform:translateY(-1px);}#footer .kratos-social-icons li a{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;}#footer .kratos-social-icons li a .footer-social-icon{width:34px;height:34px;object-fit:contain;display:block;}#footer .kratos-social-icons li a .footer-icon-email{filter:brightness(0) invert(1);opacity:.94;}#footer .kratos-social-icons li a .footer-icon-github{filter:brightness(0) invert(1);opacity:.95;}.kr-comments-disabled{margin:16px 0;padding:12px 14px;border:1px dashed rgba(160,160,160,.45);border-radius:10px;color:#9aa3b7;background:rgba(90,98,120,.08);text-align:center;}</style>"
  footer: ""
  after_footer: "<script>window.__COMMENTS_ENABLED=false;</script>"
  tools: ""
