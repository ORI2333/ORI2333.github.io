name: Deploy Blog

on:
  push:
    branches:
      - source
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HK_DEPLOY_ENABLED: ${{ secrets.HK_SSH_KEY != '' && secrets.HK_HOST != '' }}

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Hexo site
        run: npm run clean && npm run build

      - name: Deploy to main branch (GitHub Pages)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: main

      - name: Install HK SSH key
        if: ${{ env.HK_DEPLOY_ENABLED == 'true' }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.HK_SSH_KEY }}" > ~/.ssh/hk_deploy_key
          chmod 600 ~/.ssh/hk_deploy_key

      - name: Deploy to Hong Kong static host
        if: ${{ env.HK_DEPLOY_ENABLED == 'true' }}
        env:
          HK_HOST: ${{ secrets.HK_HOST }}
          HK_PORT: ${{ secrets.HK_PORT }}
          HK_USER: ${{ secrets.HK_USER }}
          HK_REMOTE_ROOT: ${{ secrets.HK_REMOTE_ROOT }}
          HK_SSH_KEY_PATH: ~/.ssh/hk_deploy_key
        run: npm run deploy:hk
