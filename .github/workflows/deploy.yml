name: Deploy Blog

on:
  push:
    branches:
      - source
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HK_DEPLOY_ENABLED: ${{ secrets.HK_SSH_KEY != '' && secrets.HK_HOST != '' }}

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v5
        with:
          ref: source

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Hexo site
        run: npm run clean && npm run build

      - name: Deploy to main branch (GitHub Pages)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf /tmp/ori-blog-pages
          git clone --depth 1 --branch main "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/ori-blog-pages
          find /tmp/ori-blog-pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a public/. /tmp/ori-blog-pages/
          cd /tmp/ori-blog-pages
          touch .nojekyll
          git add -A
          if git diff --cached --quiet; then
            echo "No GitHub Pages changes to deploy."
          else
            git commit -m "deploy: update pages"
            git push origin main
          fi

      - name: Install HK SSH key
        if: ${{ env.HK_DEPLOY_ENABLED == 'true' }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.HK_SSH_KEY }}" > ~/.ssh/hk_deploy_key
          chmod 600 ~/.ssh/hk_deploy_key

      - name: Deploy to Hong Kong static host
        if: ${{ env.HK_DEPLOY_ENABLED == 'true' }}
        env:
          HK_HOST: ${{ secrets.HK_HOST }}
          HK_PORT: ${{ secrets.HK_PORT }}
          HK_USER: ${{ secrets.HK_USER }}
          HK_REMOTE_ROOT: ${{ secrets.HK_REMOTE_ROOT }}
          HK_SSH_KEY_PATH: ~/.ssh/hk_deploy_key
        run: npm run deploy:hk
