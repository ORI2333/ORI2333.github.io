name: Deploy Blog

on:
  push:
    branches:
      - source
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Hexo site
        run: npm run clean && npm run build

      - name: Deploy to main branch (GitHub Pages)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: main

      - name: Check CloudBase secrets
        id: tcb
        shell: bash
        run: |
          if [ -n "$TCB_SECRET_ID" ] && [ -n "$TCB_SECRET_KEY" ] && [ -n "$TCB_ENV_ID" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
            echo "CloudBase deployment will proceed."
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "CloudBase secrets not set, skipping."
          fi
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID || secrets.QCLOUDAPIKEYID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY || secrets.QCLOUDAPIKEY }}
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID || secrets.QCLOUDENVID }}

      - name: Deploy to Tencent CloudBase
        if: steps.tcb.outputs.ready == 'true'
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID || secrets.QCLOUDAPIKEYID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY || secrets.QCLOUDAPIKEY }}
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID || secrets.QCLOUDENVID }}
        run: |
          npm install @cloudbase/cli --no-audit --no-fund --prefer-offline
          npx tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY"
          npx tcb hosting deploy ./public / -e "$TCB_ENV_ID"
