name: Deploy Blog

on:
  push:
    branches:
      - source
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Hexo site
        run: npm run clean && npm run build

      - name: Deploy to main branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: main

      - name: Validate CloudBase secrets
        id: check-tcb
        shell: bash
        run: |
          if [ -n "$TCB_SECRET_ID" ] && [ -n "$TCB_SECRET_KEY" ] && [ -n "$TCB_ENV_ID" ]; then
            echo "has_tcb=true" >> $GITHUB_OUTPUT
          else
            echo "has_tcb=false" >> $GITHUB_OUTPUT
            echo "CloudBase secrets not configured, skipping Tencent Cloud deployment."
          fi
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID || secrets.QCLOUDAPIKEYID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY || secrets.QCLOUDAPIKEY }}
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID || secrets.QCLOUDENVID }}

      - name: Install CloudBase CLI
        if: steps.check-tcb.outputs.has_tcb == 'true'
        run: npm install -g @cloudbase/cli

      - name: Login to CloudBase
        if: steps.check-tcb.outputs.has_tcb == 'true'
        run: tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY"
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID || secrets.QCLOUDAPIKEYID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY || secrets.QCLOUDAPIKEY }}

      - name: Deploy to CloudBase Static Hosting
        if: steps.check-tcb.outputs.has_tcb == 'true'
        run: tcb hosting deploy ./public / -e "$TCB_ENV_ID"
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID || secrets.QCLOUDENVID }}
