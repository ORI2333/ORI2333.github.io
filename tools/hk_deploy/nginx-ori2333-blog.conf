server {
    listen 8088;
    server_name _;

    root /var/www/ori2333-blog;
    index index.html;

    location ^~ /hk/ {
        rewrite ^/hk/(.*)$ /blog/$1 permanent;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|webp|svg|ico|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
