server {
    listen 8088;
    server_name _;

    root /var/www/ori2333-blog;
    index index.html;

    access_log /var/log/nginx/ori-blog-access.log ori_blog_main;

    location ^~ /admin/ {
        proxy_pass http://127.0.0.1:8765/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/recommend {
        proxy_pass http://127.0.0.1:8765/api/recommend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /hk/ {
        rewrite ^/hk/(.*)$ /blog/$1 permanent;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|webp|svg|ico|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
